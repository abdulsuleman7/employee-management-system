
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Management</title>
    <link rel="stylesheet" th:href="@{/css/file.css}">
</head>
<body>

<h2>Add Employee</h2>

<form th:action="@{/employees/add}" th:object="${employee}" method="post">

    Name:
    <input type="text" th:field="*{name}" required />
    <br><br>

    Email:
    <input type="text" th:field="*{email}" required />
    <br><br>

    Department:
    <input type="text" th:field="*{department}" required />
    <br><br>

    Salary:
    <input type="number" th:field="*{salary}" required />
    <br><br>

    <button type="submit">Save</button>

</form>

<hr>

<h2>Employee List</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Department</th>
        <th>Salary</th>
        <th>Action</th>
    </tr>

    <tr th:each="emp : ${employees}">
        <td th:text="${emp.id}"></td>
        <td th:text="${emp.name}"></td>
        <td th:text="${emp.email}"></td>
        <td th:text="${emp.department}"></td>
        <td th:text="${emp.salary}"></td>
        <td>
            <a th:href="@{/employees/delete/{id}(id=${emp.id})}">Delete</a>
        </td>
    </tr>

</table>

</body>
</html>
